# Push to main (when package.json version has no matching tag yet) OR push tag v*
# → build Windows + macOS installers, merge updater manifest, publish GitHub Release.
# Requires repo secret: TAURI_SIGNING_PRIVATE_KEY (full minisign private key text).
# Optional later: add Apple Developer ID signing + notarization on the macOS job (cert + notarytool env).
#
# Workflow: bump version in package.json / Cargo.toml / tauri.conf.json, merge to main.
# CI creates tag v{version} and publishes the release. Subsequent main commits skip until the next bump.
# Manual tag pushes (v*) still work for rebuilds.

name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.out.outputs.tag }}
      should_release: ${{ steps.out.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - id: out
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Releasing from tag push: ${TAG}"
            exit 0
          fi

          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Invalid package.json version: ${VERSION}"
            exit 1
          fi
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping release (bump version to ship again)."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No tag ${TAG} yet — will build and publish."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      # GITHUB_REF_NAME cannot be overridden on branch pushes — use YAPPER_RELEASE_TAG.
      YAPPER_RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      # Tauri reads this when signing updater artifacts (file alone is not enough on CI).
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Require TAURI_SIGNING_PRIVATE_KEY
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: test -n "${TAURI_SIGNING_PRIVATE_KEY}"

      - name: Write minisign key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: >
          node -e "const fs=require('fs');fs.mkdirSync('src-tauri/.tauri',{recursive:true});fs.writeFileSync('src-tauri/.tauri/updater.key', process.env.TAURI_SIGNING_PRIVATE_KEY)"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bundle Windows Python runtime
        run: npm run bundle:python

      - run: npm run build

      - name: Tauri build (updater artifacts)
        run: npx tauri build -c src-tauri/tauri.updater-release.conf.json

      - name: Write platforms partial (Windows)
        run: node scripts/updater-manifest.mjs partial-windows release

      - name: Collect upload folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force upload | Out-Null
          Copy-Item -Path "src-tauri/target/release/bundle/nsis/*" -Destination upload/ -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/release/bundle/msi/*" -Destination upload/ -Force -ErrorAction SilentlyContinue
          Copy-Item platforms.partial.json upload/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: upload/
          if-no-files-found: error

  build-macos:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      YAPPER_RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Require TAURI_SIGNING_PRIVATE_KEY
        run: test -n "${TAURI_SIGNING_PRIVATE_KEY}"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Write minisign key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          mkdir -p src-tauri/.tauri
          node -e "const fs=require('fs');fs.mkdirSync('src-tauri/.tauri',{recursive:true});fs.writeFileSync('src-tauri/.tauri/updater.key', process.env.TAURI_SIGNING_PRIVATE_KEY)"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Pack release (Python + signed Tauri bundle)
        run: bash scripts/pack-with-updater-signing.sh --release

      - name: Write platforms partial (Darwin)
        run: node scripts/updater-manifest.mjs partial-darwin release

      - name: Collect upload folder
        run: |
          mkdir -p upload
          shopt -s nullglob
          # Updater + installers only — skip build helpers like bundle_dmg.sh / icon.icns.
          for d in src-tauri/target/release/bundle/dmg src-tauri/target/release/bundle/macos; do
            if [ -d "$d" ]; then
              for f in "$d"/*; do
                [ -f "$f" ] || continue
                base="$(basename "$f")"
                case "$base" in
                  *.app.tar.gz|*.app.tar.gz.sig|*.dmg|*.dmg.sig) cp "$f" upload/ ;;
                esac
              done
            fi
          done
          cp platforms.partial.json upload/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: upload/
          if-no-files-found: error

  publish:
    needs: [resolve-tag, build-windows, build-macos]
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: windows-assets
          path: assets/windows

      - uses: actions/download-artifact@v4
        with:
          name: macos-assets
          path: assets/macos

      - name: Merge latest.json
        env:
          YAPPER_RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          mkdir -p release-out
          node scripts/updater-manifest.mjs merge \
            assets/windows/platforms.partial.json \
            assets/macos/platforms.partial.json \
            -o release-out/latest.json

      - name: Rewrite download URLs to release tag
        env:
          YAPPER_RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          node -e '
            const fs = require("fs");
            const tag = process.env.YAPPER_RELEASE_TAG;
            if (!tag) throw new Error("YAPPER_RELEASE_TAG missing");
            const p = "release-out/latest.json";
            const m = JSON.parse(fs.readFileSync(p, "utf8"));
            for (const plat of Object.values(m.platforms || {})) {
              if (!plat.url) continue;
              plat.url = plat.url.replace(/\/releases\/download\/[^/]+\//, `/releases/download/${tag}/`);
            }
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + "\n");
            console.log("Pinned updater URLs to", tag);
          '

      - name: Stage release binaries
        run: |
          shopt -s nullglob
          for f in assets/windows/*; do
            [[ "$(basename "$f")" == platforms.partial.json ]] && continue
            cp "$f" release-out/
          done
          for f in assets/macos/*; do
            [[ "$(basename "$f")" == platforms.partial.json ]] && continue
            cp "$f" release-out/
          done

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
