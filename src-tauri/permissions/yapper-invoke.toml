[[permission]]
identifier = "allow-yapper-invoke"
description = "Allows Yapper custom IPC (engine, dictation, settings, dictionary, node server, etc.)."
commands.allow = [
  "model_cache_diagnostic",
  "get_setting_cmd",
  "set_setting_cmd",
  "list_keybinds_cmd",
  "set_keybind_cmd",
  "refresh_global_shortcuts",
  "list_dictionary_cmd",
  "upsert_dictionary_cmd",
  "delete_dictionary_cmd",
  "export_dictionary_to_path",
  "import_dictionary_from_path",
  "list_corrections_cmd",
  "upsert_correction_cmd",
  "delete_correction_cmd",
  "paste_text",
  "engine_start",
  "engine_stop",
  "engine_status",
  "ptt_start",
  "ptt_stop",
  "transcribe_file",
  "cuda_available",
  "list_audio_input_devices",
  "get_mic_input_level",
  "install_nvidia_whisper_libs",
  "hud_chrome_info",
  "hud_snapshot",
  "hud_sync_visibility_cmd",
  "focus_main_window",
  "sync_windows_taskbar_icon",
  "yapper_node_status",
  "yapper_node_start",
  "yapper_node_stop",
]
